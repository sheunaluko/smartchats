[package]
name = "sail-dsp"
version = "0.1.0"
edition = "2021"
description = "Rust→WASM audio DSP primitives for SmartChats Audio Intelligence Lab (/sail)"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"

[profile.release]
# Optimize for small wasm size — /sail loads this in the browser, every KB matters.
opt-level = "z"
lto = true
codegen-units = 1
