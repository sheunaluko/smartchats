name: release

# Triggered by:
#   - Pushing a tag matching v*  → builds + uploads to a GitHub Release.
#   - workflow_dispatch          → manual run (no upload, just verifies the
#                                  build works on all platforms).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for uploading release assets

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14            # M-series
            native: true
          - target: darwin-x64
            runner: macos-13            # Intel
            native: true
          - target: linux-x64
            runner: ubuntu-22.04
            native: true
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            native: true
          - target: windows-x64
            runner: windows-latest
            native: true
            # bash shell required for build-release.sh; available on
            # windows-latest as Git Bash by default.
            shell: bash
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node (for npm install in workspaces + build scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install workspace deps
        run: npm install --no-fund --no-audit

      - name: Build release tarball
        run: scripts/build-release.sh --target ${{ matrix.target }}

      - name: Smoke-test extracted tarball (Unix-like)
        if: matrix.target != 'windows-x64'
        run: |
          mkdir -p /tmp/sc-test
          tar -xzf "dist-release/smartchats-${{ matrix.target }}.tar.gz" -C /tmp/sc-test
          ls -la /tmp/sc-test/bin
          /tmp/sc-test/bin/smartchats help | head -5

      - name: Smoke-test extracted tarball (Windows)
        if: matrix.target == 'windows-x64'
        run: |
          mkdir -p sc-test
          tar -xzf "dist-release/smartchats-${{ matrix.target }}.tar.gz" -C sc-test
          ls -la sc-test/bin
          ./sc-test/bin/smartchats.exe help | head -5

      - name: Install asciinema (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y asciinema

      - name: Install asciinema (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: brew install asciinema

      - name: Record install asciinema cast (Unix-like only)
        # Windows lacks a PTY-allocating shell that asciinema can attach to
        # out of the box. Skip for now; revisit if PowerShell-native recording
        # tooling matures.
        if: matrix.target != 'windows-x64'
        run: |
          mkdir -p dist-release/casts
          asciinema rec --quiet \
            --command "/tmp/sc-test/bin/smartchats help && /tmp/sc-test/bin/smartchats home && /tmp/sc-test/bin/smartchats status" \
            "dist-release/casts/smartchats-${{ matrix.target }}.cast" || true

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartchats-${{ matrix.target }}
          path: |
            dist-release/smartchats-${{ matrix.target }}.tar.gz
            dist-release/casts/*.cast
          if-no-files-found: warn

      - name: Upload to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/smartchats-${{ matrix.target }}.tar.gz
            dist-release/casts/*.cast
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Once all five platform builds succeed, mark the release as the latest.
  publish:
    name: mark release latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Mark as latest
        uses: softprops/action-gh-release@v2
        with:
          make_latest: 'true'
          generate_release_notes: true

  # Publish the smartchats-ai CLI to npm. Runs in parallel with the binary
  # matrix (npm publish doesn't need the tarballs), but we still gate on
  # `needs: build` so a failing matrix doesn't ship a half-broken release
  # to npm. Requires NPM_TOKEN as a repository secret — generate at
  # https://www.npmjs.com/settings/<user>/tokens (Automation token, granted
  # publish scope on smartchats-ai).
  npm:
    name: npm publish smartchats-ai
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps (so the CLI's workspace imports resolve)
        run: npm install --no-fund --no-audit

      - name: Verify package.json version matches the tag
        # The bin/release script enforces this locally, but double-check
        # here so a stray manual tag can't ship a mismatched version.
        run: |
          PKG_VERSION=$(node -p "require('./packages/smartchats-cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match git tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing smartchats-ai@$PKG_VERSION"

      - name: Build + publish
        # prepack runs `npm run build:bundle` (tsup) automatically.
        # --access public for scoped/new packages (no-op for already-public).
        run: npm publish --access public
        working-directory: packages/smartchats-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
