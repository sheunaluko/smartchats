name: release

# Triggered by:
#   - Pushing a tag matching v*  → builds + uploads to a GitHub Release.
#   - workflow_dispatch          → manual run (no upload, just verifies the
#                                  build works on all platforms).
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for uploading release assets

# Opt into Node.js 24 for the runtime that *executes* JS actions
# (actions/checkout, actions/setup-node, etc). Node 20 is being
# deprecated; GitHub forces this default on 2026-06-16 and removes
# Node 20 entirely on 2026-09-16. See:
#   https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
# This is independent of the `node-version` we pass to setup-node below
# (that controls what Node our *workspace* scripts run on).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            runner: macos-14            # M-series
            native: true
          - target: darwin-x64
            runner: macos-13            # Intel
            native: true
            # macos-13 runners are severely capacity-constrained on
            # GitHub-hosted infrastructure (queue times routinely > 1 h).
            # Intel Macs were also discontinued by Apple in 2023, so the
            # affected user base is tiny and shrinking. Mark this target
            # non-blocking so `needs: build` downstream (npm publish +
            # mark-latest) can fire when the other 4 platforms succeed
            # even if darwin-x64 fails or never gets a runner. ARM Mac
            # users (vast majority) and everyone else are unaffected. If
            # darwin-x64 succeeds, the tarball ships normally.
            continue_on_error: true
          - target: linux-x64
            runner: ubuntu-22.04
            native: true
          - target: linux-arm64
            runner: ubuntu-22.04-arm
            native: true
          - target: windows-x64
            runner: windows-latest
            native: true
            # bash shell required for build-release.sh; available on
            # windows-latest as Git Bash by default.
            shell: bash
    runs-on: ${{ matrix.runner }}
    # When matrix.continue_on_error is true, a failed job is treated as
    # success for the purpose of `needs:` chains downstream.
    continue-on-error: ${{ matrix.continue_on_error || false }}
    defaults:
      run:
        shell: ${{ matrix.shell || 'bash' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Node (for npm install in workspaces + build scripts)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install workspace deps
        run: npm install --no-fund --no-audit

      - name: Build release tarball
        run: scripts/build-release.sh --target ${{ matrix.target }}

      - name: Smoke-test extracted tarball (Unix-like)
        if: matrix.target != 'windows-x64'
        run: |
          mkdir -p /tmp/sc-test
          tar -xzf "dist-release/smartchats-${{ matrix.target }}.tar.gz" -C /tmp/sc-test
          ls -la /tmp/sc-test/bin
          /tmp/sc-test/bin/smartchats help | head -5

      - name: Smoke-test extracted tarball (Windows)
        if: matrix.target == 'windows-x64'
        run: |
          mkdir -p sc-test
          tar -xzf "dist-release/smartchats-${{ matrix.target }}.tar.gz" -C sc-test
          ls -la sc-test/bin
          ./sc-test/bin/smartchats.exe help | head -5

      - name: Install asciinema (Linux)
        if: startsWith(matrix.runner, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y asciinema

      - name: Install asciinema (macOS)
        if: startsWith(matrix.runner, 'macos')
        run: brew install asciinema

      - name: Record install asciinema cast (Unix-like only)
        # Windows lacks a PTY-allocating shell that asciinema can attach to
        # out of the box. Skip for now; revisit if PowerShell-native recording
        # tooling matures.
        if: matrix.target != 'windows-x64'
        run: |
          mkdir -p dist-release/casts
          asciinema rec --quiet \
            --command "/tmp/sc-test/bin/smartchats help && /tmp/sc-test/bin/smartchats home && /tmp/sc-test/bin/smartchats status" \
            "dist-release/casts/smartchats-${{ matrix.target }}.cast" || true

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartchats-${{ matrix.target }}
          path: |
            dist-release/smartchats-${{ matrix.target }}.tar.gz
            dist-release/casts/*.cast
          if-no-files-found: warn

      - name: Upload to GitHub Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/smartchats-${{ matrix.target }}.tar.gz
            dist-release/casts/*.cast
          fail_on_unmatched_files: false
          generate_release_notes: true

  # Once all five platform builds succeed, mark the release as the latest.
  publish:
    name: mark release latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Mark as latest
        uses: softprops/action-gh-release@v2
        with:
          make_latest: 'true'
          generate_release_notes: true

  # Publish smartchats-ai to npm via Trusted Publishing (OIDC).
  # No NPM_TOKEN secret — GitHub Actions mints a short-lived OIDC token
  # at job time and exchanges it with npm for a publish credential. Setup:
  #   https://www.npmjs.com/package/smartchats-ai/access → Trusted Publishers
  #     Org/User: sheunaluko
  #     Repo:     smartchats
  #     Workflow: release.yml
  #
  # `--provenance` attaches a signed attestation of what built the package
  # (workflow run, git SHA, repo). Users can verify the chain on npmjs.com.
  #
  # `needs: build` so a failing matrix doesn't ship a half-broken release.
  npm:
    name: npm publish smartchats-ai
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write   # required for Trusted Publishing OIDC
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install workspace deps (so CLI's workspace imports resolve)
        run: npm install --no-fund --no-audit

      - name: Verify package.json version matches the tag
        run: |
          PKG_VERSION=$(node -p "require('./packages/smartchats-cli/package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) doesn't match git tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing smartchats-ai@$PKG_VERSION"

      - name: Build + publish (Trusted Publishing OIDC)
        # prepack runs `npm run build:bundle` (tsup) automatically.
        # No token — npm uses the GHA OIDC token via id-token write.
        run: npm publish --access public --provenance
        working-directory: packages/smartchats-cli
